[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = ["outputs", "tmp", "work"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "B", "UP"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.13"
files = ["app"]
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true
